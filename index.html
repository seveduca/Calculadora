<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="calculator">
        <div class="display">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>
        <div class="buttons">
            <button data-action="clear" class="btn btn-action">AC</button>
            <button data-action="delete" class="btn btn-action">DEL</button>
            <button data-action="percent" class="btn btn-action">%</button>
            <button data-operation="÷" class="btn btn-operator">÷</button>
            
            <button data-number="7" class="btn">7</button>
            <button data-number="8" class="btn">8</button>
            <button data-number="9" class="btn">9</button>
            <button data-operation="×" class="btn btn-operator">×</button>
            
            <button data-number="4" class="btn">4</button>
            <button data-number="5" class="btn">5</button>
            <button data-number="6" class="btn">6</button>
            <button data-operation="-" class="btn btn-operator">-</button>
            
            <button data-number="1" class="btn">1</button>
            <button data-number="2" class="btn">2</button>
            <button data-number="3" class="btn">3</button>
            <button data-operation="+" class="btn btn-operator">+</button>
            
            <button data-number="0" class="btn btn-zero">0</button>
            <button data-number="." class="btn">.</button>
            <button data-action="compute" class="btn btn-equals">=</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
